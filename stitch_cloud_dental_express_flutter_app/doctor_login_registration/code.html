<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cloud Dental Express - Doctor Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                        "surface": "#f5faff",

                        "primary-fixed": "#d5e3ff",
                        "on-primary-fixed-variant": "#324768",
                        "background": "#f5faff",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#021c3a",
                        "on-surface": "#161c21",
                        "on-tertiary-fixed-variant": "#004d67",
                        "surface-container-low": "#eef4fa",

                    spacing: {

                        "gutter": "16px",
                        "container-padding": "16px",
                        "base": "8px",
                        "card-gap": "12px"

                    fontFamily: {
                        "headline-lg": ["DM Sans"],
                        "label-md": ["DM Sans"],

<style>
        body {
            background-color: #EAF0F6; /* Fallback */
            background-image: radial-gradient(at 0% 0%, hsla(210, 40%, 94%, 1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, hsla(213, 73%, 15%, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 13, 34, 0.05);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.2s ease-in-out;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 2px rgba(10, 35, 66, 0.1);
            outline: none;
        }
        .btn-press {
            transition: transform 0.15s ease;
        }
        .btn-press:active {
            transform: scale(0.96);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface font-body-md flex items-center justify-center p-margin-mobile antialiased">
<main class="w-full max-w-md">
<div class="text-center mb-8">
<span class="material-symbols-outlined text-primary text-5xl mb-4" style="font-variation-settings: 'FILL' 1;">dentistry</span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Cloud Dental Express</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Precision lab workflows, simplified.</p>
</div>
<div class="glass-panel rounded-xl p-container-padding flex flex-col gap-card-gap">
<h2 class="font-headline-md text-headline-md text-primary mb-2">Create Doctor Account</h2>
<form class="flex flex-col gap-base" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="doctor_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="glass-input w-full rounded-lg pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="doctor_name" placeholder="Dr. Jane Smith" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="clinic_name">Clinic Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">business</span>
<input class="glass-input w-full rounded-lg pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="clinic_name" placeholder="Smith Family Dentistry" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="address">Clinic Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-outline">location_on</span>
<textarea class="glass-input w-full rounded-lg pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant resize-none" id="address" placeholder="123 Medical Plaza..." rows="2"></textarea>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Pin Location</label>
<div class="relative w-full h-32 rounded-lg overflow-hidden border border-white/25">
<img alt="Map representation" class="w-full h-full object-cover opacity-70" data-location="New York" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaIwW5CHBTV2RSpm8A1_XXM3pnrpardPEDSv1KvYfkwPLTI5oFC6vME5MYanKCnWv1Z6gU-YkqjWKBRLDosjUCZk6Tna1rKxN8pPMt5G1mgtSrs8mbuxUrI6vl8P6mdanJUIsDeZie1KiNWsQpw7OQO8_MajCTBaxfGeZxoOSyh46yEWHy7rbIQoMZftAgzFdqhjiJSAYD6a7kfm1XaaUGbgBvdVfe0NdpThVkiMsJ5SgYopM1B75BH5Pi928Ite6YpJexEGyPsLPv"/>
<div class="absolute inset-0 bg-white/10 flex items-center justify-center cursor-pointer hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">pin_drop</span>
</div>
</div>
<p class="font-label-md text-label-md text-outline-variant text-right">Tap to set precise location</p>
</div>
<button class="btn-press mt-4 w-full bg-primary text-on-primary font-headline-md text-headline-md rounded-lg py-3 shadow-md hover:bg-primary-container transition-colors" type="submit">
                    Register Account
                </button>
</form>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="flex-shrink-0 mx-4 text-on-surface-variant font-label-md text-label-md">OR</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<button class="btn-press w-full glass-input text-primary font-headline-md text-headline-md rounded-lg py-3 flex items-center justify-center gap-2 hover:bg-white/60">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<p class="text-center font-label-md text-label-md text-on-surface-variant mt-2">
                Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log In</a>
</p>
</div>
<div class="mt-8 text-center text-outline font-label-md text-label-md opacity-70">
            © 2024 Cloud Dental Express. Secure Gateway.
        </div>
</main>
</body></html>
